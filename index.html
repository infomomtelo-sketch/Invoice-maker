<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice | EC Rental Property Management LLC</title>
    <style>
        :root {
            --primary-color: #0d47a1; /* Professional Blue */
            --secondary-color: #f5f7fa; /* Light Gray Background */
            --border-color: #dee2e6;
            --text-color: #333;
            --light-text-color: #777;
            --danger-color: #e53935;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--secondary-color);
            color: var(--text-color);
        }
        .page-container {
            max-width: 900px;
            margin: 20px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            padding: 40px;
            border-top: 5px solid var(--primary-color);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        .header h1 {
            color: var(--primary-color);
            font-size: 2.5em;
            margin: 0;
        }
        .company-details h2 {
            margin: 0 0 5px 0;
            font-size: 1.2em;
        }
        .company-details p { margin: 0; font-size: 0.9em; color: var(--light-text-color); }
        .invoice-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .meta-box h3 { font-size: 1em; margin: 0 0 10px 0; color: var(--primary-color); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        input, textarea {
            width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px;
            font-size: 0.9em; box-sizing: border-box; background-color: #fdfdfd;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(13, 71, 161, 0.1); }
        textarea { resize: vertical; min-height: 60px; }
        .meta-details { display: grid; grid-template-columns: 100px 1fr; gap: 10px; align-items: center; }
        .meta-details label { font-weight: bold; font-size: 0.9em; }
        .items-table, .saved-invoices-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .items-table th, .items-table td, .saved-invoices-table th, .saved-invoices-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .items-table th, .saved-invoices-table th { background-color: var(--secondary-color); font-size: 0.85em; font-weight: 600; text-transform: uppercase; }
        .items-table td input { padding: 6px; }
        .items-table .quantity input, .items-table .price input { max-width: 100px; text-align: right; }
        .items-table .total, .saved-invoices-table .invoice-amount { text-align: right; font-weight: 500; }
        .delete-row button { background: none; border: none; color: var(--danger-color); cursor: pointer; font-size: 1.2em; padding: 0; line-height: 1; }
        .add-item-btn { background-color: #e8f0fe; color: var(--primary-color); border: 1px dashed var(--primary-color); padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        .add-item-btn:hover { background-color: #dbe6fb; }
        .summary { display: flex; justify-content: flex-end; }
        .summary-table { width: 100%; max-width: 350px; }
        .summary-table td { padding: 8px 12px; }
        .summary-table tr td:first-child { font-weight: 600; text-align: right; }
        .summary-table tr td:last-child { text-align: right; }
        .summary-table input { max-width: 80px; text-align: right; }
        .grand-total { background-color: var(--primary-color); color: #fff !important; font-size: 1.2em; font-weight: bold; }
        .notes-section { margin-top: 40px; }
        .notes-section h3 { font-size: 1em; color: var(--primary-color); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin-bottom: 10px; }
        .actions { margin-top: 40px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .action-btn { background-color: var(--primary-color); color: #fff; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: 600; transition: background-color 0.2s; }
        .action-btn.secondary { background-color: #4CAF50; }
        .action-btn.secondary:hover { background-color: #43a047; }
        .action-btn.tertiary { background-color: #6c757d; }
        .action-btn.tertiary:hover { background-color: #5a6268; }
        .action-btn:hover { background-color: #0b3a82; }
        .footer-credit { text-align: center; margin-top: 30px; font-size: 0.8em; color: var(--light-text-color); }
        .footer-credit a { color: var(--primary-color); text-decoration: none; }
        .footer-credit a:hover { text-decoration: underline; }
        #invoiceListView { display: none; } /* Hide list view by default */
        .saved-invoices-actions button { background: none; border: 1px solid; border-radius: 4px; padding: 5px 10px; cursor: pointer; margin-right: 5px; font-size: 0.9em; }
        .saved-invoices-actions .view-btn { border-color: var(--primary-color); color: var(--primary-color); }
        .saved-invoices-actions .delete-btn { border-color: var(--danger-color); color: var(--danger-color); }
        @media print {
            body { background-color: #fff; padding: 0; }
            .page-container { box-shadow: none; margin: 0; max-width: 100%; border-radius: 0; padding: 20px; border-top: 5px solid var(--primary-color); }
            .actions, .footer-credit, .add-item-btn, .delete-row button, #viewSavedInvoicesBtn { display: none; }
            input, textarea { border: 1px solid transparent !important; background-color: #fff !important; -webkit-print-color-adjust: exact; color-adjust: exact; padding: 2px !important; }
            #invoiceListView { display: none !important; }
            #invoiceCreatorView { display: block !important; }
        }
    </style>
</head>
<body>

<div class="page-container">
    <!-- INVOICE CREATOR VIEW -->
    <div id="invoiceCreatorView">
        <header class="header">
            <div class="company-details">
                <input type="text" id="companyName" value="EC Rental Property Management LLC" style="font-size:1.2em; font-weight:bold; border:none; padding:0;">
                <input type="text" id="companyAddress1" placeholder="Your Address">
                <input type="text" id="companyAddress2" placeholder="City, State, ZIP">
                <input type="email" id="companyEmail" placeholder="your.email@example.com">
                <input type="tel" id="companyPhone" placeholder="(123) 456-7890">
            </div>
            <h1>INVOICE</h1>
        </header>
        <section class="invoice-meta">
            <div class="meta-box bill-to">
                <h3>BILL TO</h3>
                <input type="text" id="clientName" placeholder="Client Name / Company">
                <textarea id="clientAddress" placeholder="Client Address"></textarea>
            </div>
            <div class="meta-box invoice-details">
                <h3>DETAILS</h3>
                <div class="meta-details">
                    <label for="invoiceId">Invoice #</label>
                    <input type="text" id="invoiceId" placeholder="001">
                    <label for="invoiceDate">Date</label>
                    <input type="date" id="invoiceDate">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate">
                </div>
            </div>
        </section>
        <table class="items-table" id="itemsTable">
            <thead>
                <tr>
                    <th>Item Description</th><th class="quantity">Quantity</th><th class="price">Price</th><th class="total">Total</th><th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button class="add-item-btn" onclick="addItem()">+ Add Item</button>
        <section class="summary">
            <table class="summary-table">
                <tbody>
                    <tr><td>Subtotal</td><td id="subtotal">$0.00</td></tr>
                    <tr><td>Tax (%)</td><td><input type="number" class="summary-value" id="tax" value="0" oninput="updateSummary()"></td></tr>
                    <tr><td>Discount ($)</td><td><input type="number" class="summary-value" id="discount" value="0" oninput="updateSummary()"></td></tr>
                    <tr class="grand-total"><td>Grand Total</td><td id="grandTotal">$0.00</td></tr>
                </tbody>
            </table>
        </section>
        <section class="notes-section">
            <h3>Notes / Terms</h3>
            <textarea id="notes" placeholder="e.g., Payment due within 30 days."></textarea>
        </section>
    </div>

    <!-- SAVED INVOICES LIST VIEW -->
    <div id="invoiceListView">
        <header class="header">
            <h2>Saved Invoices</h2>
            <button class="action-btn tertiary" onclick="showView('invoiceCreatorView')">← Back to Creator</button>
        </header>
        <table class="saved-invoices-table" id="savedInvoicesTable">
            <thead>
                <tr><th>Invoice #</th><th>Client Name</th><th>Date</th><th class="invoice-amount">Amount</th><th>Actions</th></tr>
            </thead>
            <tbody><!-- Saved invoices will be populated here --></tbody>
        </table>
    </div>

    <div class="actions">
        <button class="action-btn" onclick="window.print()">Print / Save as PDF</button>
        <button class="action-btn secondary" onclick="saveInvoice()">Save & View List</button>
        <button class="action-btn tertiary" id="viewSavedInvoicesBtn" onclick="showView('invoiceListView')">View Saved Invoices</button>
    </div>

    <div class="footer-credit">
        Built with <a href='https://fluentra-ai.lovable.app'>Fluentra AI</a>
    </div>
</div>

<script>
    const storageKey = 'fluentraInvoices_ecRental';

    document.addEventListener('DOMContentLoaded', () => {
        loadCompanyDetails();
        resetInvoice();
    });

    // --- VIEW MANAGEMENT ---
    function showView(viewId) {
        document.getElementById('invoiceCreatorView').style.display = 'none';
        document.getElementById('invoiceListView').style.display = 'none';
        document.getElementById(viewId).style.display = 'block';

        if (viewId === 'invoiceListView') {
            renderInvoiceList();
            document.getElementById('viewSavedInvoicesBtn').style.display = 'none';
        } else {
            document.getElementById('viewSavedInvoicesBtn').style.display = 'inline-block';
        }
    }

    // --- INVOICE ACTIONS ---
    function resetInvoice() {
        document.getElementById('clientName').value = '';
        document.getElementById('clientAddress').value = '';
        document.getElementById('invoiceId').value = `INV-${Date.now().toString().slice(-4)}`;
        document.getElementById('invoiceDate').valueAsDate = new Date();
        document.getElementById('dueDate').value = '';
        document.getElementById('notes').value = '';
        document.getElementById('itemsTable').getElementsByTagName('tbody')[0].innerHTML = '';
        addItem();
        updateSummary();
    }

    function addItem(item = { desc: '', qty: 1, price: 0 }) {
        const tableBody = document.getElementById('itemsTable').getElementsByTagName('tbody')[0];
        const newRow = tableBody.insertRow();
        newRow.innerHTML = `
            <td><input type="text" placeholder="e.g., Monthly Rent" value="${item.desc}" oninput="updateSummary()"></td>
            <td class="quantity"><input type="number" value="${item.qty}" min="0" oninput="updateSummary()"></td>
            <td class="price"><input type="number" value="${item.price}" step="0.01" min="0" oninput="updateSummary()"></td>
            <td class="total">$0.00</td>
            <td><button onclick="deleteItem(this)">&times;</button></td>
        `;
    }

    function deleteItem(btn) {
        btn.closest('tr').remove();
        updateSummary();
    }

    function updateSummary() {
        let subtotal = 0;
        document.querySelectorAll('#itemsTable tbody tr').forEach(row => {
            const quantity = parseFloat(row.cells[1].querySelector('input').value) || 0;
            const price = parseFloat(row.cells[2].querySelector('input').value) || 0;
            const total = quantity * price;
            row.cells[3].innerText = formatCurrency(total);
            subtotal += total;
        });
        const taxPercent = parseFloat(document.getElementById('tax').value) || 0;
        const discountAmount = parseFloat(document.getElementById('discount').value) || 0;
        const taxAmount = subtotal * (taxPercent / 100);
        const grandTotal = subtotal + taxAmount - discountAmount;
        document.getElementById('subtotal').innerText = formatCurrency(subtotal);
        document.getElementById('grandTotal').innerText = formatCurrency(grandTotal);
    }
    
    function formatCurrency(amount) {
        return '$' + (amount ? amount.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,') : '0.00');
    }

    // --- DATA & LOCAL STORAGE ---
    function saveCompanyDetails() {
         const companyDetails = {
            name: document.getElementById('companyName').value,
            address1: document.getElementById('companyAddress1').value,
            address2: document.getElementById('companyAddress2').value,
            email: document.getElementById('companyEmail').value,
            phone: document.getElementById('companyPhone').value,
        };
        localStorage.setItem(`${storageKey}_company`, JSON.stringify(companyDetails));
    }

    function loadCompanyDetails() {
        const details = JSON.parse(localStorage.getItem(`${storageKey}_company`));
        if(details) {
            document.getElementById('companyName').value = details.name;
            document.getElementById('companyAddress1').value = details.address1;
            document.getElementById('companyAddress2').value = details.address2;
            document.getElementById('companyEmail').value = details.email;
            document.getElementById('companyPhone').value = details.phone;
        }
        // Add listeners to save on change
        document.querySelectorAll('.company-details input').forEach(input => {
            input.addEventListener('change', saveCompanyDetails);
        });
    }

    function saveInvoice() {
        const invoiceId = document.getElementById('invoiceId').value;
        if (!invoiceId) {
            alert('Please enter an Invoice # before saving.');
            return;
        }
        const items = [];
        document.querySelectorAll('#itemsTable tbody tr').forEach(row => {
            items.push({
                desc: row.cells[0].querySelector('input').value,
                qty: row.cells[1].querySelector('input').value,
                price: row.cells[2].querySelector('input').value
            });
        });
        const invoiceData = {
            id: invoiceId,
            clientName: document.getElementById('clientName').value,
            clientAddress: document.getElementById('clientAddress').value,
            invoiceDate: document.getElementById('invoiceDate').value,
            dueDate: document.getElementById('dueDate').value,
            items: items,
            tax: document.getElementById('tax').value,
            discount: document.getElementById('discount').value,
            notes: document.getElementById('notes').value,
            total: document.getElementById('grandTotal').innerText
        };

        let invoices = JSON.parse(localStorage.getItem(storageKey)) || [];
        const existingIndex = invoices.findIndex(inv => inv.id === invoiceId);
        if (existingIndex > -1) {
            invoices[existingIndex] = invoiceData; // Update existing
        } else {
            invoices.push(invoiceData); // Add new
        }
        localStorage.setItem(storageKey, JSON.stringify(invoices));
        alert('Invoice ' + invoiceId + ' saved successfully!');
        showView('invoiceListView');
    }

    function renderInvoiceList() {
        const invoices = JSON.parse(localStorage.getItem(storageKey)) || [];
        const tableBody = document.getElementById('savedInvoicesTable').getElementsByTagName('tbody')[0];
        tableBody.innerHTML = '';
        invoices.sort((a, b) => new Date(b.invoiceDate) - new Date(a.invoiceDate)); // Show newest first
        
        invoices.forEach(invoice => {
            const newRow = tableBody.insertRow();
            newRow.innerHTML = `
                <td>${invoice.id}</td>
                <td>${invoice.clientName}</td>
                <td>${invoice.invoiceDate}</td>
                <td class="invoice-amount">${invoice.total}</td>
                <td class="saved-invoices-actions">
                    <button class="view-btn" onclick="viewInvoice('${invoice.id}')">View</button>
                    <button class="delete-btn" onclick="deleteInvoice('${invoice.id}')">Delete</button>
                </td>
            `;
        });
    }

    function viewInvoice(id) {
        const invoices = JSON.parse(localStorage.getItem(storageKey)) || [];
        const invoice = invoices.find(inv => inv.id === id);
        if (invoice) {
            document.getElementById('clientName').value = invoice.clientName;
            document.getElementById('clientAddress').value = invoice.clientAddress;
            document.getElementById('invoiceId').value = invoice.id;
            document.getElementById('invoiceDate').value = invoice.invoiceDate;
            document.getElementById('dueDate').value = invoice.dueDate;
            document.getElementById('notes').value = invoice.notes;
            document.getElementById('tax').value = invoice.tax;
            document.getElementById('discount').value = invoice.discount;

            document.getElementById('itemsTable').getElementsByTagName('tbody')[0].innerHTML = '';
            invoice.items.forEach(item => addItem(item));
            updateSummary();
            showView('invoiceCreatorView');
        }
    }

    function deleteInvoice(id) {
        if (confirm(`Are you sure you want to delete Invoice ${id}? This cannot be undone.`)) {
            let invoices = JSON.parse(localStorage.getItem(storageKey)) || [];
            invoices = invoices.filter(inv => inv.id !== id);
            localStorage.setItem(storageKey, JSON.stringify(invoices));
            renderInvoiceList();
        }
    }
</script>

</body>
</html>
