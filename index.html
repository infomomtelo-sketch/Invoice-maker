<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice | EC Rental Property Management LLC</title>
    <style>
        :root {
            --primary-color: #0d47a1; /* Professional Blue */
            --secondary-color: #f5f7fa; /* Light Gray Background */
            --border-color: #dee2e6;
            --text-color: #333;
            --light-text-color: #777;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--secondary-color);
            color: var(--text-color);
        }
        .invoice-container {
            max-width: 900px;
            margin: 20px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            padding: 40px;
            border-top: 5px solid var(--primary-color);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        .header h1 {
            color: var(--primary-color);
            font-size: 2.5em;
            margin: 0;
        }
        .company-details h2 {
            margin: 0 0 5px 0;
            font-size: 1.2em;
        }
        .company-details p {
            margin: 0;
            font-size: 0.9em;
            color: var(--light-text-color);
        }
        .invoice-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }
        .meta-box h3 {
            font-size: 1em;
            margin: 0 0 10px 0;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.9em;
            box-sizing: border-box;
            background-color: #fdfdfd;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(13, 71, 161, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        .meta-details {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 10px;
            align-items: center;
        }
        .meta-details label {
            font-weight: bold;
            font-size: 0.9em;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .items-table th, .items-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .items-table th {
            background-color: var(--secondary-color);
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }
        .items-table td input {
            padding: 6px;
        }
        .items-table .quantity input, .items-table .price input {
            max-width: 100px;
            text-align: right;
        }
        .items-table .total {
            text-align: right;
            font-weight: 500;
        }
        .items-table .delete-row {
            width: 30px;
            text-align: center;
        }
        .delete-row button {
            background: none;
            border: none;
            color: #e53935;
            cursor: pointer;
            font-size: 1.2em;
            padding: 0;
            line-height: 1;
        }
        .add-item-btn {
            background-color: #e8f0fe;
            color: var(--primary-color);
            border: 1px dashed var(--primary-color);
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .add-item-btn:hover {
            background-color: #dbe6fb;
        }
        .summary {
            display: flex;
            justify-content: flex-end;
        }
        .summary-table {
            width: 100%;
            max-width: 350px;
        }
        .summary-table td {
            padding: 8px 12px;
        }
        .summary-table tr td:first-child {
            font-weight: 600;
            text-align: right;
        }
        .summary-table tr td:last-child {
            text-align: right;
        }
        .summary-table input {
            max-width: 80px;
            text-align: right;
        }
        .grand-total {
            background-color: var(--primary-color);
            color: #fff !important;
            font-size: 1.2em;
            font-weight: bold;
        }
        .notes-section {
            margin-top: 40px;
        }
        .notes-section h3 {
            font-size: 1em;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .actions {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        .print-btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .print-btn:hover {
            background-color: #0b3a82;
        }
        .footer-credit {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8em;
            color: var(--light-text-color);
        }
        .footer-credit a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .footer-credit a:hover {
            text-decoration: underline;
        }
        @media print {
            body { 
                background-color: #fff;
                padding: 0;
             }
            .invoice-container {
                box-shadow: none;
                margin: 0;
                max-width: 100%;
                border-radius: 0;
                padding: 20px;
            }
            .actions, .footer-credit, .add-item-btn, .delete-row button {
                display: none;
            }
            input, textarea {
                border: 1px solid transparent !important;
                background-color: #fff !important;
                -webkit-print-color-adjust: exact; 
                color-adjust: exact;
            }
             input:not(.summary-value), textarea {
                padding: 2px;
                border: none !important;
             }
        }
    </style>
</head>
<body>

<div class="invoice-container">
    <header class="header">
        <div class="company-details">
            <h2>EC Rental Property Management LLC</h2>
            <p>
                <input type="text" placeholder="Your Address">
                <input type="text" placeholder="City, State, ZIP">
                <input type="email" placeholder="your.email@example.com">
                <input type="tel" placeholder="(123) 456-7890">
            </p>
        </div>
        <h1>INVOICE</h1>
    </header>

    <section class="invoice-meta">
        <div class="meta-box bill-to">
            <h3>BILL TO</h3>
            <input type="text" placeholder="Client Name / Company">
            <textarea placeholder="Client Address"></textarea>
        </div>
        <div class="meta-box invoice-details">
            <h3>DETAILS</h3>
            <div class="meta-details">
                <label for="invoice-id">Invoice #</label>
                <input type="text" id="invoice-id" placeholder="001">
                <label for="invoice-date">Date</label>
                <input type="date" id="invoice-date">
                <label for="due-date">Due Date</label>
                <input type="date" id="due-date">
            </div>
        </div>
    </section>

    <table class="items-table" id="itemsTable">
        <thead>
            <tr>
                <th>Item Description</th>
                <th class="quantity">Quantity</th>
                <th class="price">Price</th>
                <th class="total">Total</th>
                <th class="delete-row"></th>
            </tr>
        </thead>
        <tbody>
            <!-- Line items will be added here by JavaScript -->
        </tbody>
    </table>

    <button class="add-item-btn" onclick="addItem()">+ Add Item</button>

    <section class="summary">
        <table class="summary-table">
            <tbody>
                <tr>
                    <td>Subtotal</td>
                    <td id="subtotal">$0.00</td>
                </tr>
                <tr>
                    <td>Tax (%)</td>
                    <td><input type="number" class="summary-value" id="tax" value="0" oninput="updateSummary()"></td>
                </tr>
                 <tr>
                    <td>Discount ($)</td>
                    <td><input type="number" class="summary-value" id="discount" value="0" oninput="updateSummary()"></td>
                </tr>
                <tr class="grand-total">
                    <td>Grand Total</td>
                    <td id="grandTotal">$0.00</td>
                </tr>
            </tbody>
        </table>
    </section>

    <section class="notes-section">
        <h3>Notes / Terms</h3>
        <textarea placeholder="e.g., Payment due within 30 days. Late fees may apply."></textarea>
    </section>
    
    <div class="actions">
        <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
    </div>

    <div class="footer-credit">
        Built with <a href='https://fluentra-ai.lovable.app'>Fluentra AI</a>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        addItem(); // Start with one item row
        document.getElementById('invoice-date').valueAsDate = new Date();
    });

    function addItem() {
        const tableBody = document.getElementById('itemsTable').getElementsByTagName('tbody')[0];
        const newRow = tableBody.insertRow();
        newRow.innerHTML = `
            <td><input type="text" placeholder="e.g., Monthly Rent or Repair Service" oninput="updateSummary()"></td>
            <td class="quantity"><input type="number" value="1" min="0" oninput="updateSummary()"></td>
            <td class="price"><input type="number" value="0.00" step="0.01" min="0" oninput="updateSummary()"></td>
            <td class="total">$0.00</td>
            <td class="delete-row"><button onclick="deleteRow(this)">&times;</button></td>
        `;
    }

    function deleteRow(btn) {
        const row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
        updateSummary();
    }

    function updateSummary() {
        let subtotal = 0;
        const rows = document.getElementById('itemsTable').getElementsByTagName('tbody')[0].getElementsByTagName('tr');

        for (let row of rows) {
            const quantity = parseFloat(row.cells[1].getElementsByTagName('input')[0].value) || 0;
            const price = parseFloat(row.cells[2].getElementsByTagName('input')[0].value) || 0;
            const total = quantity * price;
            row.cells[3].innerText = formatCurrency(total);
            subtotal += total;
        }

        const taxPercent = parseFloat(document.getElementById('tax').value) || 0;
        const discountAmount = parseFloat(document.getElementById('discount').value) || 0;
        
        const taxAmount = subtotal * (taxPercent / 100);
        const grandTotal = subtotal + taxAmount - discountAmount;

        document.getElementById('subtotal').innerText = formatCurrency(subtotal);
        document.getElementById('grandTotal').innerText = formatCurrency(grandTotal);
    }

    function formatCurrency(amount) {
        return '$' + amount.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
    }
</script>

</body>
</html>
